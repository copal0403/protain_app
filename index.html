<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>Protein Log</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --sub: #6b7280;
      --line: #e5e7eb;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --danger: #dc2626;
      --danger-soft: #fee2e2;
      --ok: #059669;
      --ok-soft: #d1fae5;
      --warn: #d97706;
      --warn-soft: #fef3c7;
      --shadow: 0 10px 30px rgba(17,24,39,.08);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .app {
      max-width: 760px;
      margin: 0 auto;
      padding: 16px 16px 32px;
    }
    h1,h2,h3,p { margin: 0; }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin: 10px 0 16px;
    }
    .title { font-size: 28px; font-weight: 800; letter-spacing: -.02em; }
    .muted { color: var(--sub); }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 14px;
    }
    .summary-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
      margin-bottom: 12px;
    }
    .big { font-size: 34px; font-weight: 800; }
    .goal-chip {
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .status-chip {
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 800;
      font-size: 13px;
    }
    .status-chip.ok {
      background: var(--ok-soft);
      color: var(--ok);
    }
    .status-chip.ng {
      background: var(--warn-soft);
      color: var(--warn);
    }
    .progress {
      width: 100%;
      height: 16px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin: 12px 0 8px;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #93c5fd, #2563eb);
      border-radius: 999px;
      transition: width .25s ease, background .25s ease;
    }
    .progress-bar.ok {
      background: linear-gradient(90deg, #6ee7b7, #059669);
    }
    .mini-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 12px;
    }
    .mini {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: #fcfcfd;
    }
    .mini .label { font-size: 12px; color: var(--sub); margin-bottom: 4px; }
    .mini .value { font-size: 20px; font-weight: 800; }
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      position: sticky;
      top: 0;
      z-index: 2;
      background: linear-gradient(var(--bg), var(--bg));
      padding: 8px 0 4px;
      overflow-x: auto;
    }
    .tab {
      border: 1px solid var(--line);
      background: white;
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .tab.active {
      background: var(--text);
      color: white;
      border-color: var(--text);
    }
    .hidden { display: none; }
    form { display: grid; gap: 12px; }
    .field label {
      display: block;
      font-size: 13px;
      color: var(--sub);
      margin-bottom: 6px;
      font-weight: 700;
    }
    input, select, button { font: inherit; }
    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 13px 14px;
      background: white;
    }
    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    button.primary {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-weight: 800;
      cursor: pointer;
    }
    button.secondary {
      background: white;
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .entry-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }
    .entry {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      background: white;
    }
    .entry-actions {
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .food { font-weight: 700; }
    .grams { font-weight: 800; }
    .entry-sub { color: var(--sub); font-size: 13px; margin-top: 4px; }
    .delete-btn, .copy-btn {
      border: none;
      border-radius: 10px;
      padding: 8px 10px;
      font-weight: 700;
      cursor: pointer;
    }
    .delete-btn {
      background: var(--danger-soft);
      color: var(--danger);
    }
    .copy-btn {
      background: var(--accent-soft);
      color: var(--accent);
    }
    .day-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: white;
      margin-bottom: 12px;
    }
    .day-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .day-title { font-weight: 800; }
    .day-total {
      font-weight: 800;
    }
    .day-total.ok { color: var(--ok); }
    .day-total.ng { color: var(--warn); }
    .small { font-size: 13px; }
    .empty {
      text-align: center;
      color: var(--sub);
      padding: 26px 10px;
    }
    .install {
      font-size: 13px;
      color: var(--sub);
      line-height: 1.5;
    }
    .chart-toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .range-btn {
      border: 1px solid var(--line);
      background: white;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .range-btn.active {
      background: var(--text);
      color: white;
      border-color: var(--text);
    }
    .chart-wrap {
      width: 100%;
      overflow-x: auto;
    }
    .chart-box {
      min-width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      padding: 12px 12px 8px;
    }
    canvas {
      display: block;
      width: 100%;
      height: 280px;
    }
    .legend {
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:10px;
      color: var(--sub);
      font-size: 13px;
    }
    .legend-item { display:flex; align-items:center; gap:6px; }
    .dot {
      width: 10px; height: 10px; border-radius: 999px;
      display:inline-block;
    }
    .dot.ok { background: #059669; }
    .dot.ng { background: #2563eb; }
    .line-sample {
      width: 18px; height: 0; border-top: 2px dashed #d97706; display:inline-block;
    }
    @media (max-width: 600px) {
      .mini-grid, .row-2 { grid-template-columns: 1fr; }
      .big { font-size: 30px; }
      .title { font-size: 24px; }
      .app { padding: 12px 12px 28px; }
      canvas { height: 240px; }
      .entry { grid-template-columns: 1fr; }
      .entry-actions { justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <div>
        <div class="title">Protein Log</div>
        <div class="muted" id="todayLabel"></div>
      </div>
      <button class="secondary" id="exportBtn" type="button">データ書き出し</button>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="home">ホーム</button>
      <button class="tab" data-tab="add">記録追加</button>
      <button class="tab" data-tab="history">履歴</button>
      <button class="tab" data-tab="chart">グラフ</button>
      <button class="tab" data-tab="settings">設定</button>
    </div>

    <section id="home" class="tab-panel">
      <div class="card">
        <div class="summary-row">
          <div>
            <div class="muted">今日の合計</div>
            <div class="big"><span id="todayTotal">0</span>g</div>
          </div>
          <div class="goal-chip">目標 <span id="goalValue">80</span>g</div>
        </div>

        <div class="status-row">
          <div class="status-chip ng" id="statusChip">未達成</div>
          <div class="muted small" id="statusDetail">あと80gで達成</div>
        </div>

        <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
        <div class="muted small" id="progressText">0% 達成</div>

        <div class="mini-grid">
          <div class="mini">
            <div class="label">残り</div>
            <div class="value"><span id="remainingValue">80</span>g</div>
          </div>
          <div class="mini">
            <div class="label">件数</div>
            <div class="value" id="countValue">0</div>
          </div>
          <div class="mini">
            <div class="label">平均</div>
            <div class="value"><span id="avgValue">0</span>g</div>
          </div>
        </div>
      </div>

      <div class="card">
        <h3>今日の記録</h3>
        <div id="todayEntries" class="entry-list"></div>
      </div>

      <div class="card install">
        iPhoneではSafariで開いて共有ボタンから「ホーム画面に追加」を使うと、アプリっぽく使えます。
      </div>
    </section>

    <section id="add" class="tab-panel hidden">
      <div class="card">
        <h3 style="margin-bottom: 12px;">記録を追加</h3>
        <form id="entryForm">
          <div class="field">
            <label for="foodName">食べ物</label>
            <input id="foodName" type="text" placeholder="例: サラダチキン" required />
          </div>
          <div class="row-2">
            <div class="field">
              <label for="proteinGrams">たんぱく質量 (g)</label>
              <input id="proteinGrams" type="number" min="0" step="0.1" placeholder="例: 24" required />
            </div>
            <div class="field">
              <label for="entryDate">日付</label>
              <input id="entryDate" type="date" required />
            </div>
          </div>
          <button class="primary" type="submit">保存</button>
        </form>
      </div>
    </section>

    <section id="history" class="tab-panel hidden">
      <div class="card">
        <h3 style="margin-bottom: 12px;">履歴</h3>
        <div id="historyList"></div>
      </div>
    </section>

    <section id="chart" class="tab-panel hidden">
      <div class="card">
        <h3 style="margin-bottom: 12px;">摂取量グラフ</h3>
        <div class="chart-toolbar" id="chartRangeToolbar">
          <button type="button" class="range-btn active" data-range="7">7日</button>
          <button type="button" class="range-btn" data-range="14">14日</button>
          <button type="button" class="range-btn" data-range="30">30日</button>
          <button type="button" class="range-btn" data-range="all">全期間</button>
        </div>
        <div class="chart-wrap">
          <div class="chart-box">
            <canvas id="chartCanvas" width="700" height="280"></canvas>
          </div>
        </div>
        <div class="legend">
          <div class="legend-item"><span class="dot ok"></span> 目標達成日</div>
          <div class="legend-item"><span class="dot ng"></span> 未達成日</div>
          <div class="legend-item"><span class="line-sample"></span> 目標ライン</div>
        </div>
        <div class="muted small" id="chartSummary" style="margin-top:10px;"></div>
      </div>
    </section>

    <section id="settings" class="tab-panel hidden">
      <div class="card">
        <h3 style="margin-bottom: 12px;">設定</h3>
        <form id="settingsForm">
          <div class="field">
            <label for="dailyGoal">1日の摂取目標 (g)</label>
            <input id="dailyGoal" type="number" min="1" step="1" placeholder="80" required />
          </div>
          <button class="primary" type="submit">保存</button>
        </form>
      </div>

      <div class="card">
        <h3 style="margin-bottom: 12px;">データ管理</h3>
        <div style="display:grid; gap:10px;">
          <button id="importBtn" class="secondary" type="button">データ読み込み</button>
          <input id="importFile" type="file" accept="application/json" class="hidden" />
          <button id="clearBtn" class="secondary" type="button">全データ削除</button>
        </div>
      </div>
    </section>
  </div>

  <script>
    const STORAGE_KEY = "protein-log-app-v2";
    const LEGACY_STORAGE_KEY = "protein-log-app-v1";

    const state = loadState();
    let selectedChartRange = "7";

    const todayLabel = document.getElementById("todayLabel");
    const todayTotalEl = document.getElementById("todayTotal");
    const goalValueEl = document.getElementById("goalValue");
    const remainingValueEl = document.getElementById("remainingValue");
    const countValueEl = document.getElementById("countValue");
    const avgValueEl = document.getElementById("avgValue");
    const progressBarEl = document.getElementById("progressBar");
    const progressTextEl = document.getElementById("progressText");
    const todayEntriesEl = document.getElementById("todayEntries");
    const historyListEl = document.getElementById("historyList");
    const statusChipEl = document.getElementById("statusChip");
    const statusDetailEl = document.getElementById("statusDetail");
    const chartCanvas = document.getElementById("chartCanvas");
    const chartSummaryEl = document.getElementById("chartSummary");

    const entryForm = document.getElementById("entryForm");
    const foodNameInput = document.getElementById("foodName");
    const proteinGramsInput = document.getElementById("proteinGrams");
    const entryDateInput = document.getElementById("entryDate");

    const settingsForm = document.getElementById("settingsForm");
    const dailyGoalInput = document.getElementById("dailyGoal");

    document.getElementById("exportBtn").addEventListener("click", exportData);
    document.getElementById("importBtn").addEventListener("click", () => document.getElementById("importFile").click());
    document.getElementById("importFile").addEventListener("change", importData);
    document.getElementById("clearBtn").addEventListener("click", clearAllData);

    document.querySelectorAll(".tab").forEach(btn => {
      btn.addEventListener("click", () => openTab(btn.dataset.tab));
    });

    document.querySelectorAll(".range-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        selectedChartRange = btn.dataset.range;
        document.querySelectorAll(".range-btn").forEach(x => x.classList.toggle("active", x.dataset.range === selectedChartRange));
        renderChart();
      });
    });

    entryForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const food = foodNameInput.value.trim();
      const grams = Number(proteinGramsInput.value);
      const date = entryDateInput.value;
      if (!food || !date || Number.isNaN(grams) || grams < 0) return;

      state.entries.push({
        id: crypto.randomUUID(),
        food,
        grams,
        date,
        createdAt: new Date().toISOString()
      });

      saveState();
      entryForm.reset();
      entryDateInput.value = todayISO();
      render();
      openTab("home");
    });

    settingsForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const goal = Number(dailyGoalInput.value);
      if (Number.isNaN(goal) || goal <= 0) return;
      state.dailyGoal = goal;
      saveState();
      render();
      openTab("home");
    });

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY) || localStorage.getItem(LEGACY_STORAGE_KEY);
        if (!raw) return { dailyGoal: 80, entries: [] };
        const parsed = JSON.parse(raw);
        return {
          dailyGoal: Number(parsed.dailyGoal) > 0 ? Number(parsed.dailyGoal) : 80,
          entries: Array.isArray(parsed.entries) ? parsed.entries.map(normalizeEntry).filter(Boolean) : []
        };
      } catch {
        return { dailyGoal: 80, entries: [] };
      }
    }

    function normalizeEntry(e) {
      if (!e) return null;
      return {
        id: e.id || crypto.randomUUID(),
        food: String(e.food || ""),
        grams: Number(e.grams || 0),
        date: String(e.date || todayISO()),
        createdAt: e.createdAt || new Date().toISOString()
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function todayISO() {
      const now = new Date();
      const tz = now.getTimezoneOffset();
      const local = new Date(now.getTime() - tz * 60000);
      return local.toISOString().slice(0, 10);
    }

    function formatDate(dateString) {
      const d = new Date(dateString + "T00:00:00");
      return new Intl.DateTimeFormat("ja-JP", {
        year: "numeric", month: "long", day: "numeric", weekday: "short"
      }).format(d);
    }

    function shortDate(dateString) {
      const d = new Date(dateString + "T00:00:00");
      return new Intl.DateTimeFormat("ja-JP", { month: "numeric", day: "numeric" }).format(d);
    }

    function entriesForDate(dateStr) {
      return state.entries
        .filter(e => e.date === dateStr)
        .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
    }

    function totalForDate(dateStr) {
      return entriesForDate(dateStr).reduce((sum, e) => sum + Number(e.grams), 0);
    }

    function getAllDatesSortedAsc() {
      const dates = [...new Set(state.entries.map(e => e.date))].sort((a, b) => a.localeCompare(b));
      return dates;
    }

    function getChartData() {
      const allDates = getAllDatesSortedAsc();
      if (!allDates.length) return [];
      let dates = allDates;
      if (selectedChartRange !== "all") {
        const n = Number(selectedChartRange);
        const end = new Date(todayISO() + "T00:00:00");
        dates = [];
        for (let i = n - 1; i >= 0; i--) {
          const d = new Date(end);
          d.setDate(d.getDate() - i);
          dates.push(toISODateLocal(d));
        }
      }
      return dates.map(date => ({
        date,
        total: totalForDate(date),
        achieved: totalForDate(date) >= state.dailyGoal
      }));
    }

    function toISODateLocal(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function render() {
      const today = todayISO();
      todayLabel.textContent = formatDate(today);
      entryDateInput.value = today;
      dailyGoalInput.value = state.dailyGoal;

      const todayEntries = entriesForDate(today);
      const todayTotal = todayEntries.reduce((sum, e) => sum + Number(e.grams), 0);
      const count = todayEntries.length;
      const avg = count ? todayTotal / count : 0;
      const goal = state.dailyGoal;
      const ratio = goal > 0 ? todayTotal / goal : 0;
      const percent = Math.min(ratio * 100, 100);
      const remaining = Math.max(goal - todayTotal, 0);
      const achieved = todayTotal >= goal;

      todayTotalEl.textContent = trimNumber(todayTotal);
      goalValueEl.textContent = trimNumber(goal);
      remainingValueEl.textContent = trimNumber(remaining);
      countValueEl.textContent = String(count);
      avgValueEl.textContent = trimNumber(avg);
      progressBarEl.style.width = percent + "%";
      progressBarEl.classList.toggle("ok", achieved);
      progressTextEl.textContent = `${Math.round(ratio * 100)}% 達成`;

      statusChipEl.textContent = achieved ? "達成" : "未達成";
      statusChipEl.className = `status-chip ${achieved ? "ok" : "ng"}`;
      statusDetailEl.textContent = achieved
        ? `目標を ${trimNumber(todayTotal - goal)}g 上回っています`
        : `あと${trimNumber(remaining)}gで達成`;

      renderTodayEntries(todayEntries);
      renderHistory();
      renderChart();
    }

    function trimNumber(n) {
      return Number.isInteger(n) ? String(n) : Number(n).toFixed(1).replace(/\.0$/, "");
    }

    function renderTodayEntries(entries) {
      if (!entries.length) {
        todayEntriesEl.innerHTML = '<div class="empty">まだ記録がありません</div>';
        return;
      }
      todayEntriesEl.innerHTML = entries.map(e => `
        <div class="entry">
          <div>
            <div class="food">${escapeHtml(e.food)}</div>
            <div class="entry-sub">${formatDate(e.date)}</div>
          </div>
          <div class="entry-actions">
            <div class="grams">${trimNumber(Number(e.grams))}g</div>
            <button class="delete-btn" onclick="deleteEntry('${e.id}')">削除</button>
          </div>
        </div>
      `).join("");
    }

    function renderHistory() {
      if (!state.entries.length) {
        historyListEl.innerHTML = '<div class="empty">履歴がありません</div>';
        return;
      }

      const groups = {};
      for (const entry of state.entries) {
        if (!groups[entry.date]) groups[entry.date] = [];
        groups[entry.date].push(entry);
      }

      const dates = Object.keys(groups).sort((a, b) => b.localeCompare(a));

      historyListEl.innerHTML = dates.map(date => {
        const dayEntries = groups[date].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
        const total = dayEntries.reduce((sum, e) => sum + Number(e.grams), 0);
        const achieved = total >= state.dailyGoal;
        return `
          <div class="day-card">
            <div class="day-head">
              <div class="day-title">${formatDate(date)}</div>
              <div class="day-total ${achieved ? "ok" : "ng"}">合計 ${trimNumber(total)}g ${achieved ? "・達成" : "・未達成"}</div>
            </div>
            <div class="entry-list">
              ${dayEntries.map(e => `
                <div class="entry">
                  <div>
                    <div class="food">${escapeHtml(e.food)}</div>
                    <div class="entry-sub">${trimNumber(Number(e.grams))}g</div>
                  </div>
                  <div class="entry-actions">
                    <button class="copy-btn" onclick="copyEntryToToday('${e.id}')">今日に追加</button>
                    <button class="delete-btn" onclick="deleteEntry('${e.id}')">削除</button>
                  </div>
                </div>
              `).join("")}
            </div>
          </div>
        `;
      }).join("");
    }

    function renderChart() {
      const data = getChartData();
      const ctx = chartCanvas.getContext("2d");
      const dpr = window.devicePixelRatio || 1;
      const parentWidth = chartCanvas.parentElement.clientWidth;
      const computedWidth = Math.max(parentWidth, data.length * 52, 320);
      const cssHeight = window.innerWidth <= 600 ? 240 : 280;
      chartCanvas.style.width = computedWidth + "px";
      chartCanvas.style.height = cssHeight + "px";
      chartCanvas.width = Math.floor(computedWidth * dpr);
      chartCanvas.height = Math.floor(cssHeight * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, computedWidth, cssHeight);

      if (!data.length) {
        ctx.fillStyle = "#6b7280";
        ctx.font = "14px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("グラフ表示用のデータがありません", computedWidth / 2, cssHeight / 2);
        chartSummaryEl.textContent = "まだ記録がないため、グラフは表示されません。";
        return;
      }

      const goal = state.dailyGoal;
      const maxValue = Math.max(goal, ...data.map(d => d.total), 10);
      const topPad = 20;
      const bottomPad = 42;
      const leftPad = 36;
      const rightPad = 12;
      const plotWidth = computedWidth - leftPad - rightPad;
      const plotHeight = cssHeight - topPad - bottomPad;
      const barWidth = Math.max(18, Math.min(34, plotWidth / Math.max(data.length, 1) * 0.56));
      const stepX = plotWidth / Math.max(data.length, 1);

      ctx.strokeStyle = "#e5e7eb";
      ctx.lineWidth = 1;
      ctx.font = "12px sans-serif";
      ctx.fillStyle = "#6b7280";
      ctx.textAlign = "right";

      const tickCount = 4;
      for (let i = 0; i <= tickCount; i++) {
        const value = maxValue / tickCount * i;
        const y = topPad + plotHeight - (value / maxValue) * plotHeight;
        ctx.beginPath();
        ctx.moveTo(leftPad, y);
        ctx.lineTo(computedWidth - rightPad, y);
        ctx.stroke();
        ctx.fillText(trimNumber(value), leftPad - 6, y + 4);
      }

      const goalY = topPad + plotHeight - (goal / maxValue) * plotHeight;
      ctx.setLineDash([6, 5]);
      ctx.strokeStyle = "#d97706";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(leftPad, goalY);
      ctx.lineTo(computedWidth - rightPad, goalY);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = "#d97706";
      ctx.textAlign = "left";
      ctx.fillText(`目標 ${trimNumber(goal)}g`, leftPad + 6, Math.max(14, goalY - 6));

      data.forEach((item, i) => {
        const xCenter = leftPad + stepX * i + stepX / 2;
        const h = (item.total / maxValue) * plotHeight;
        const x = xCenter - barWidth / 2;
        const y = topPad + plotHeight - h;

        ctx.fillStyle = item.achieved ? "#059669" : "#2563eb";
        ctx.beginPath();
        const radius = 8;
        roundRect(ctx, x, y, barWidth, h, radius);
        ctx.fill();

        ctx.fillStyle = "#374151";
        ctx.font = "11px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(trimNumber(item.total), xCenter, Math.max(12, y - 6));
        ctx.fillStyle = "#6b7280";
        ctx.fillText(shortDate(item.date), xCenter, cssHeight - 16);
      });

      const achievedCount = data.filter(d => d.achieved).length;
      chartSummaryEl.textContent = `${labelForRange(selectedChartRange)}で ${achievedCount}/${data.length} 日が目標達成です。`;
    }

    function labelForRange(range) {
      if (range === "all") return "全期間";
      return `直近${range}日`;
    }

    function roundRect(ctx, x, y, width, height, radius) {
      const r = Math.min(radius, width / 2, height / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + width, y, x + width, y + height, r);
      ctx.arcTo(x + width, y + height, x, y + height, r);
      ctx.arcTo(x, y + height, x, y, r);
      ctx.arcTo(x, y, x + width, y, r);
      ctx.closePath();
    }

    function deleteEntry(id) {
      const ok = confirm("この記録を削除しますか？");
      if (!ok) return;
      const idx = state.entries.findIndex(e => e.id === id);
      if (idx >= 0) {
        state.entries.splice(idx, 1);
        saveState();
        render();
      }
    }
    window.deleteEntry = deleteEntry;

    function copyEntryToToday(id) {
      const source = state.entries.find(e => e.id === id);
      if (!source) return;
      state.entries.push({
        id: crypto.randomUUID(),
        food: source.food,
        grams: Number(source.grams),
        date: todayISO(),
        createdAt: new Date().toISOString()
      });
      saveState();
      render();
      alert("今日の日付で追加しました。");
    }
    window.copyEntryToToday = copyEntryToToday;

    function clearAllData() {
      const ok = confirm("すべての記録と設定を削除します。よろしいですか？");
      if (!ok) return;
      state.entries = [];
      state.dailyGoal = 80;
      saveState();
      render();
      openTab("home");
    }

    function exportData() {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `protein-log-backup-${todayISO()}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          if (!Array.isArray(data.entries)) throw new Error();
          state.entries = data.entries.map(normalizeEntry).filter(Boolean);
          state.dailyGoal = Number(data.dailyGoal) > 0 ? Number(data.dailyGoal) : 80;
          saveState();
          render();
          alert("読み込みました。");
        } catch {
          alert("読み込みに失敗しました。JSONファイルを確認してください。");
        } finally {
          event.target.value = "";
        }
      };
      reader.readAsText(file);
    }

    function openTab(name) {
      document.querySelectorAll(".tab").forEach(x => x.classList.toggle("active", x.dataset.tab === name));
      document.querySelectorAll(".tab-panel").forEach(x => x.classList.toggle("hidden", x.id !== name));
      if (name === "chart") {
        requestAnimationFrame(renderChart);
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    window.addEventListener("resize", () => {
      renderChart();
    });

    render();
  </script>
</body>
</html>
